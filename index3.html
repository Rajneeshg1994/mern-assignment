<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assignment 3</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f0f0f0;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 30px;
    }

    .container {
      margin-top: 20px;
    }

    input {
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      margin-left: 10px;
      border: none;
      background-color: black;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #333;
    }

    .boxes {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }

    .box {
      width: 120px;
      height: 120px;
      background: white;
      border: 2px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .box:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>
 <h1 id="greeting">Hello</h1>
 

  <div class="container">
    

    <div class="boxes">
      <div class="box" onclick="changeColor(this, 'red')">Red</div>
      <div class="box" onclick="changeColor(this, 'blue')">Blue</div>
      <div class="box" onclick="changeColor(this, 'green')">Green</div>
      <div class="box" onclick="changeColor(this, 'yellow')">Yellow</div>
    </div>

<br><br><br>

    <input type="text" id="nameInput" placeholder="Enter your name">
    <button onclick="greetUser()">Greet</button>
    <br><br>
  </div>



  <script>
    function greetUser() {
      const name = document.getElementById("nameInput").value;
      const greeting = document.getElementById("greeting");

      if (name.trim() === "") {
        greeting.textContent = "Hello";
      } else {
        greeting.textContent = "Hello, " + name;
      }
    }

    function changeColor(box, color) {
      box.style.backgroundColor = color;
    }
  </script>

</body>
</html>
